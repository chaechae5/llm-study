site_name: LLM Study Docs
site_description: Perceptron to RAG and AI Agent study notes
site_url: ""
repo_name: chaechae5/llm-study
repo_url: https://github.com/chaechae5/llm-study
docs_dir: docs
theme:
  name: mkdocs
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - tables
  - fenced_code
  - toc:
      permalink: true
exclude_docs: |
  .git/**
  .github/**
  .venv/**
  __pycache__/**
