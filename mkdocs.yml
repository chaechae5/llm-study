      - 퍼셉트론 핵심 개념: 01_AI_기초/perceptron_core_concepts.md
  - LangChain:
      - LangChain 개념: 02_LangChain/langchain.md
  - RAG:
      - 노션 트러블슈팅 검색기: 03_RAG/notion_troubleshooting_search/notion_troubleshooting_search.md
  - AI Agent:
      - AI Agent 개념: 04_AI_Agent/AI_Agent_개념.md
      - LangGraph 개념: 04_AI_Agent/LangGraph_개념.md
